name: check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: moon check
        run: moon update && moon version && moon check --target js

      - name: moon build
        run: moon build --target js
